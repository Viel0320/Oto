name: Android Release Publish

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag to publish (leave empty to use versionName(versionCode))."
        required: false
        type: string
      release_name:
        description: "Human-readable GitHub Release title (defaults to tag name)."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: true
        default: true
        type: boolean
      generate_changelog:
        description: "Generate changelog from commit titles since the previous stable release."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish-release:
    name: Publish Signed Release
    runs-on: windows-latest
    env:
      KEYSTORE_FILE: ${{ github.workspace }}\app\release-ci.jks
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Release changelog generation compares the target commit against the
          # latest stable GitHub Release tag, so tags must be present locally.
          fetch-tags: true

      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      # Release Version Resolution (Extracts versionName and versionCode from the build script)
      # Defaults to the format 'versionName(versionCode)' if no manual tag is provided via workflow dispatch.
      - name: Resolve Release Version
        id: version
        shell: pwsh
        run: |
          $versionName = (Get-Content app/build.gradle.kts | Select-String 'versionName\s*=\s*"([^"]+)"').Matches.Groups[1].Value
          $versionCode = (git rev-list --count HEAD).Trim()
          $autoTag = "$versionName($versionCode)"
          
          $tagName = if ([string]::IsNullOrWhiteSpace("${{ inputs.tag_name }}")) { $autoTag } else { "${{ inputs.tag_name }}" }
          $releaseName = if ([string]::IsNullOrWhiteSpace("${{ inputs.release_name }}")) { $tagName } else { "${{ inputs.release_name }}" }
          
          echo "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          echo "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          echo "Resolved Tag: $tagName"

      # Stable Release Changelog Generation (Uses only non-prerelease GitHub Releases as the comparison base)
      # The generated body is built from commit subjects so release notes stay aligned with the repository history.
      - name: Generate Stable Release Changelog
        if: ${{ inputs.generate_changelog }}
        id: changelog
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $previousStableReleaseJson = gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to query GitHub Releases for the previous stable release."
          }

          $previousStableRelease = @($previousStableReleaseJson | ConvertFrom-Json) | Select-Object -First 1

          $previousTag = if ($null -eq $previousStableRelease) {
            ""
          } else {
            $previousStableRelease.tagName
          }

          $notesFile = Join-Path $env:RUNNER_TEMP "release-changelog.md"
          $notes = [System.Collections.Generic.List[string]]::new()
          $notes.Add("## Changelog")

          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $notes.Add("")
            $notes.Add("Changes included in this release:")
            $commitTitles = @(git log $env:GITHUB_SHA "--pretty=format:%s")
          } else {
            $previousTagRef = "refs/tags/$previousTag^{commit}"
            git rev-parse --verify $previousTagRef | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw "The previous stable release tag '$previousTag' was not found in the checked out repository."
            }

            $notes.Add("")
            $notes.Add("Changes since ``$previousTag``:")
            $commitTitles = @(git log "$previousTag..$env:GITHUB_SHA" "--pretty=format:%s")
          }

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to read commit titles for the release changelog."
          }

          $commitTitles = @(
            $commitTitles |
              ForEach-Object { $_.Trim() } |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
          )

          if ($commitTitles.Count -eq 0) {
            $notes.Add("- No commits were found for this release range.")
          } else {
            foreach ($title in $commitTitles) {
              $notes.Add("- $title")
            }
          }

          [IO.File]::WriteAllLines($notesFile, $notes, [Text.UTF8Encoding]::new($false))
          echo "notes_file=$notesFile" >> $env:GITHUB_OUTPUT
          echo "Generated changelog from previous stable tag: $previousTag"

      # Release Keystore Restore (Materializes the CI-only keystore file from GitHub Secrets)
      # The Gradle project receives only an ephemeral runner path, so no signing key bytes or passwords are committed.
      - name: Restore Release Keystore
        shell: pwsh
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:KEYSTORE_BASE64)) {
            throw "Missing KEYSTORE_BASE64 secret."
          }
          [IO.File]::WriteAllBytes(
            $env:KEYSTORE_FILE,
            [Convert]::FromBase64String($env:KEYSTORE_BASE64)
          )

      # Signed Artifact Build (Runs release packaging only after all signing inputs are available)
      # assembleRelease creates the signed APK, while bundleRelease creates the signed AAB for store upload.
      - name: Build Signed Release Artifacts
        run: .\gradlew.bat assembleRelease bundleRelease

      # GitHub Release Publish (Creates the release and uploads signed artifacts)
      # Uses the resolved tag name from the build metadata.
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_NAME: ${{ steps.version.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.version.outputs.release_name }}
          RELEASE_GENERATE_CHANGELOG: ${{ inputs.generate_changelog }}
          RELEASE_NOTES_FILE: ${{ steps.changelog.outputs.notes_file }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $releaseTitle = if ([string]::IsNullOrWhiteSpace($env:RELEASE_NAME)) {
            $env:RELEASE_TAG_NAME
          } else {
            $env:RELEASE_NAME
          }
          $artifacts = @(
            Get-ChildItem -Path "app/build/outputs/apk/release" -Filter "*.apk" -File
            Get-ChildItem -Path "app/build/outputs/bundle/release" -Filter "*.aab" -File
          )
          if ($artifacts.Count -eq 0) {
            throw "No signed release artifacts were produced."
          }
          $releaseArgs = @(
            "release",
            "create",
            $env:RELEASE_TAG_NAME
          )
          $releaseArgs += $artifacts.FullName
          $releaseArgs += @(
            "--title",
            $releaseTitle,
            "--target",
            $env:GITHUB_SHA
          )
          if ($env:RELEASE_GENERATE_CHANGELOG -eq "true") {
            $releaseArgs += @(
              "--notes-file",
              $env:RELEASE_NOTES_FILE
            )
          } else {
            # GitHub generated notes remain the fallback when the maintainer disables
            # commit-title changelog generation for an unusual release.
            $releaseArgs += "--generate-notes"
          }
          if ($env:RELEASE_PRERELEASE -eq "true") {
            $releaseArgs += "--prerelease"
          }
          gh @releaseArgs
