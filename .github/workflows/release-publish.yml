name: Android Release Publish

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: true
        default: true
        type: boolean
      publish:
        description: "Create and publish the GitHub Release after all gates pass."
        required: true
        default: false
        type: boolean
      manual_changelog:
        description: "Full CHANGELOG.md and release body. Leave empty to generate from commits."
        required: false
        type: string
      highlights:
        description: "Optional Highlights section for generated changelogs. Must be empty when manual_changelog is set."
        required: false
        type: string

permissions:
  contents: read

env:
  TZ: Asia/Shanghai

jobs:
  workflow-meta-check:
    name: Release Workflow Meta Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Check Release Workflow Static Invariants
        shell: pwsh
        run: ./.github/scripts/release-workflow-meta-check.ps1

  build-verify:
    name: Build And Verify Release
    runs-on: ubuntu-latest
    needs: workflow-meta-check
    permissions:
      contents: read
    outputs:
      publish_authorized: ${{ steps.verify.outputs.publish_authorized }}
    steps:
      - name: Source Ref Gate
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -ne "refs/heads/main" -and $env:GITHUB_REF -ne "refs/heads/master") {
            throw "Release publishing is only allowed from refs/heads/main or refs/heads/master. Current ref: $env:GITHUB_REF"
          }

      - name: Capture Release Environment
        id: release_env
        shell: pwsh
        run: |
          $timeZone = [TimeZoneInfo]::FindSystemTimeZoneById("Asia/Shanghai")
          $releaseDate = [TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $timeZone).ToString("yy.MM.dd", [Globalization.CultureInfo]::InvariantCulture)
          $channel = if ("${{ inputs.prerelease }}" -eq "true") { "prerelease" } else { "stable" }
          "release_date=$releaseDate" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT

      - name: Checkout Sources
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build, Verify, And Stage Release
        id: verify
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_CERTIFICATE_SHA256: ${{ vars.SIGNING_CERTIFICATE_SHA256 }}
          RELEASE_CHANNEL: ${{ steps.release_env.outputs.channel }}
          RELEASE_PUBLISH: ${{ inputs.publish }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_MANUAL_CHANGELOG: ${{ inputs.manual_changelog }}
          RELEASE_HIGHLIGHTS: ${{ inputs.highlights }}
          RELEASE_VERSION_FLOOR_OVERRIDE: ${{ vars.RELEASE_VERSION_FLOOR_OVERRIDE }}
          RELEASE_VERSION_FLOOR_OVERRIDE_IGNORED_TAG: ${{ vars.RELEASE_VERSION_FLOOR_OVERRIDE_IGNORED_TAG }}
          RELEASE_VERSION_FLOOR_OVERRIDE_REASON: ${{ vars.RELEASE_VERSION_FLOOR_OVERRIDE_REASON }}
          OTO_RELEASE_DATE: ${{ steps.release_env.outputs.release_date }}
        run: ./.github/scripts/release-build-verify.ps1

      - name: Upload Publish Handoff Artifact
        if: ${{ steps.verify.outputs.publish_authorized == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: oto-release-publish-handoff
          path: ${{ steps.verify.outputs.handoff_dir }}
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish Verified Release
    runs-on: ubuntu-latest
    needs: build-verify
    if: ${{ needs.build-verify.outputs.publish_authorized == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Download Publish Handoff Artifact
        uses: actions/download-artifact@v4
        with:
          name: oto-release-publish-handoff
          path: ${{ runner.temp }}/oto-release-publish-handoff

      - name: Publish Verified Draft Transaction
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_HANDOFF_DIR: ${{ runner.temp }}/oto-release-publish-handoff
        run: ./.github/scripts/release-publish-transaction.ps1
