name: Full Unit Tests

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  run-full-tests:
    name: Run Full Unit Tests
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5

      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run Full Unit Tests
        run: .\gradlew.bat testDebugUnitTest
