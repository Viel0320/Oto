name: NonMinified Release Build

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-non-minified:
    name: Build NonMinified Release APK
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5

      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build NonMinified Release APK
        run: .\gradlew.bat assembleNonMinifiedRelease

      - name: Upload NonMinified Release APK
        uses: actions/upload-artifact@v4
        with:
          name: non-minified-release-apk
          path: app/build/outputs/apk/nonMinifiedRelease/**/*.apk
