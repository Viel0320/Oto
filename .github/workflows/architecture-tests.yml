name: Lightweight Architecture Tests

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  run-architecture-tests:
    name: Run Architecture Tests
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Run Architecture Tests
        run: .\gradlew.bat :app:testDebugUnitTest --tests "com.viel.oto.architecture.*"
