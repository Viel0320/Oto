name: Release Kotlin Compile

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  release-compile:
    name: Release Kotlin Compile
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5

      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Compile Release Kotlin
        run: .\gradlew.bat compileReleaseKotlin
