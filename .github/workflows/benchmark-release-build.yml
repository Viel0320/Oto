name: Benchmark Release Build

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-benchmark:
    name: Build Benchmark Release APK
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5

      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Benchmark Release APK
        run: .\gradlew.bat assembleBenchmarkRelease

      - name: Upload Benchmark Release APK
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-release-apk
          path: app/build/outputs/apk/benchmarkRelease/**/*.apk
