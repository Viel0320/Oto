name: Debug Android Lint

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  lint-debug:
    name: Debug Android Lint
    runs-on: windows-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Run Debug Lint
        run: .\gradlew.bat lintDebug
